<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - VMAS</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <section id="login-page">
    <header>
      <img src="lspu_logo-removebg-preview.png" alt="VMAS Logo" class="logo" />
      <h1>Visitor Management and Analysis System (VMAS)</h1>
    </header>
    <main>      <form class="login-form" id="loginForm">
        <label for="role">Log in as:</label>
        <select id="role" name="role" required>
          <option value="">Select Role</option>
          <option value="visitor">Visitor</option>
          <option value="department">Department Staff</option>
          <option value="security">Security Guard</option>
        </select>
        <input type="text" id="userId" name="userId" placeholder="User ID / Department ID / Security ID" required />
        <input type="password" id="password" name="password" placeholder="Password" required />
        <a href="#">Forgot password?</a>
        <button type="submit">Sign In</button>
        <p>Don't have an account? <a href="register.html">Create Account</a></p>
      </form>
    </main>
  </section>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const role = document.getElementById('role').value;
      const userId = document.getElementById('userId').value;
      const password = document.getElementById('password').value;

      // Basic validation
      if (!role) {
        alert('Please select a role');
        return;
      }

      // Role-specific validation
      let idPattern;
      switch (role) {
        case 'visitor':
          idPattern = /^V\d{6}$/; // Visitor IDs start with V followed by 6 digits
          if (!idPattern.test(userId)) {
            alert('Visitor ID should be in format: V123456');
            return;
          }
          break;
        case 'department':
          idPattern = /^D\d{6}$/; // Department IDs start with D followed by 6 digits
          if (!idPattern.test(userId)) {
            alert('Department ID should be in format: D123456');
            return;
          }
          break;
        case 'security':
          idPattern = /^S\d{6}$/; // Security IDs start with S followed by 6 digits
          if (!idPattern.test(userId)) {
            alert('Security ID should be in format: S123456');
            return;
          }
          break;
      }

      // Password validation (minimum 8 characters)
      if (password.length < 8) {
        alert('Password must be at least 8 characters long');
        return;
      }

      // Here you would typically send the login data to a server
      // For now, we'll just show a success message
      alert('Login successful!');
      // You would typically redirect to a dashboard or home page here
    });

    // Update placeholder text based on selected role
    document.getElementById('role').addEventListener('change', function() {
      const userId = document.getElementById('userId');
      switch (this.value) {
        case 'visitor':
          userId.placeholder = 'Visitor ID (e.g., V123456)';
          break;
        case 'department':
          userId.placeholder = 'Department ID (e.g., D123456)';
          break;
        case 'security':
          userId.placeholder = 'Security ID (e.g., S123456)';
          break;
        default:
          userId.placeholder = 'User ID / Department ID / Security ID';
      }
    });
  </script>
</body>
</html>
